[workspace]
members = ["cargo:."]

[dist]
# This MUST be here for the Robot to accept your manual .yml edits
allow-dirty = ["ci"]
# This tells the tool exactly which package to build, stopping the panic
formula = "my-cool-cli"
# Global settings
targets = ["aarch64-apple-darwin", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
installers = ["shell", "homebrew"]
tap = "schaudhary2k/homebrew-tap"
linux-packages = ["deb"]
windows-archive = ".zip"
