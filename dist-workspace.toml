[workspace]
members = ["cargo:."]

[dist]
# This ignores the manual changes we made to the .yml file
allow-dirty = ["ci"]
# Your specific targets and installers
targets = ["aarch64-apple-darwin", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
installers = ["shell", "homebrew"]
tap = "schaudhary2k/homebrew-tap"
# This is the line that triggers the .deb creation
linux-packages = ["deb"]
windows-archive = ".zip"
