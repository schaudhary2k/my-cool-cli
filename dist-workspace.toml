[workspace]
members = ["cargo:my-cool-cli"]

[dist]
# This tells the tool exactly which package to build
formula = "my-cool-cli"
# This stops the integrity check panic
allow-dirty = ["ci"]
targets = ["aarch64-apple-darwin", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
installers = ["shell", "homebrew"]
tap = "schaudhary2k/homebrew-tap"
linux-packages = ["deb"]
windows-archive = ".zip"
