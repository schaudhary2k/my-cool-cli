[package]
name = "my-cool-cli"
version = "0.1.31"
edition = "2024"
# ... rest of your package info ...

# 1. This header tells the tool "The workspace IS this folder"
[workspace]
members = ["."]

# 2. This block must exist here to stop the 'allow-dirty' warning/panic
[workspace.metadata.dist]
allow-dirty = ["ci"]

# 3. This block handles your release targets
[package.metadata.dist]
tap = "schaudhary2k/homebrew-tap"
targets = ["aarch64-apple-darwin", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
installers = ["shell", "homebrew"]
linux-packages = ["deb"]
windows-archive = ".zip"

[package.metadata.deb]
maintainer = "Saurabh Chaudhary <chaudharysaurabh@gmail.com>"
assets = [
    ["target/release/my-cool-cli", "usr/bin/my-cool-cli", "755"],
]

[profile.dist]
inherits = "release"
lto = "thin"