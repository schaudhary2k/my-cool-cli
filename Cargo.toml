[package]
name = "my-cool-cli"
version = "0.1.24" # Move to 0.1.24
edition = "2024"

[workspace]
members = ["."]

[workspace.metadata.dist]
allow-dirty = ["ci"]

[package.metadata.dist]
tap = "schaudhary2k/homebrew-tap"
targets = ["aarch64-apple-darwin", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
installers = ["shell", "homebrew"]
linux-packages = ["deb"]
windows-archive = ".zip"

[package.metadata.deb]
maintainer = "Saurabh Chaudhary <chaudharysaurabh@gmail.com>"
assets = [
    ["target/release/my-cool-cli", "usr/bin/my-cool-cli", "755"],
]

[profile.dist]
inherits = "release"
lto = "thin"